context: |
  # Project: cairn-chat

  ## Purpose

  Prosody XMPP server for private family chat over Tailscale. Provides the
  messaging infrastructure for the cairn ecosystem. The AI bot (Sid) connects
  as a native XMPP client from the sid repo — this repo only manages the server.

  ## Scope

  - Prosody XMPP server configured for Tailscale-only access
  - MUC (Multi-User Chat) for group conversations
  - HTTP File Upload (XEP-0363) for images and documents
  - Message Archive Management (MAM) for history
  - NixOS modules for declarative configuration
  - Standalone Nix flake consumable by cairn and other projects

  ## Non-Goals

  - AI bot implementation (lives in sid repo)
  - Public internet exposure (Tailscale provides network security)
  - Federation with external XMPP servers
  - Web UI / PWA interface (use existing XMPP clients)

  ## Architecture Principles

  1. **Flake-First**: Standalone flake that exports NixOS modules
  2. **Tailscale-Only Security**: Bind to Tailscale interface, no external access
  3. **Loose Coupling**: The bot (sid) connects as any XMPP client would

  ## Tech Stack

  - **XMPP Server**: Prosody (via NixOS services.prosody)
  - **Deployment**: Nix flake with NixOS modules
  - **Network**: Tailscale for access control and DNS

  ## Project Conventions

  ### Code Style

  - **Nix**: nixfmt-rfc-style formatting.
  - **Naming**: camelCase for Nix options.

  ### Module Structure

  - NixOS modules in `modules/nixos/`
  - Home-Manager modules in `modules/home-manager/`

  ## Related Projects

  - [cairn](https://github.com/kcalvelli/cairn) - NixOS framework that imports this
  - [sid](https://github.com/keithah/sid) - AI bot that connects to this server via XMPP

  ## External Dependencies

  - Tailscale for network access control
